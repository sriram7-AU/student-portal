{% extends 'base.html' %}
{% block title %}Login – StudentPortal{% endblock %}

{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow border-0 rounded-4 mt-5">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <div class="auth-icon bg-primary rounded-circle d-inline-flex p-3 mb-3">
              <i class="bi bi-mortarboard-fill fs-2 text-white"></i>
            </div>
            <h3 class="fw-bold">Welcome Back!</h3>
            <p class="text-muted">Login to your StudentPortal account</p>
          </div>

          <form id="loginForm" action="{{ url_for('login') }}" method="POST" novalidate>
            <div class="mb-3">
              <label class="form-label fw-semibold">Email Address <span class="text-danger">*</span></label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" name="email" id="loginEmail" class="form-control"
                       placeholder="student@example.com" value="{{ request.form.email or '' }}"/>
              </div>
              <div class="invalid-feedback d-none" id="loginEmailError">Enter a valid email address.</div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold">Password <span class="text-danger">*</span></label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" name="password" id="loginPassword" class="form-control"
                       placeholder="Your password"/>
                <button type="button" class="btn btn-outline-secondary toggle-password" data-target="loginPassword">
                  <i class="bi bi-eye"></i>
                </button>
              </div>
              <div class="invalid-feedback d-none" id="loginPasswordError">Password is required.</div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
              <i class="bi bi-box-arrow-in-right me-2"></i>Login
            </button>
          </form>

          <hr class="my-4"/>
          <p class="text-center text-muted mb-0">
            Don't have an account?
            <a href="{{ url_for('register') }}" class="fw-semibold text-primary text-decoration-none">Register Free</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
